"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$line_break\
$python\
$character"""
right_format= """$cmd_duration"""

add_newline = false

[username]
show_always = false
style_user = "blue"
style_root = "red"
format ="[$user]($style) "

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "green"

[directory]
style = "blue"
truncation_length = 5
read_only = " ÔÄ£"
read_only_style = "dimmed yellow"

[git_branch]
format = "[$branch]($style)"
style = "purple"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_status]
format = "[(*$conflicted$untracked$modified$staged$renamed$deleted) ($ahead_behind$diverged)]($style)"
style = "dimmed red"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"

[python]
format = "[$virtualenv]($style) "
style = "dimmed white"
detect_extensions = []
detect_files = []

[character]
success_symbol = "[‚ùØ](green)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](purple)"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
show_notifications = false
min_time = 5_000
min_time_to_notify = 60_000

[package]
disabled = true
